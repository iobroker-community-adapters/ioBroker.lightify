# Dependabot will run on day 8 of each month at 02:57 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '20 1 18 * *'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '20 1 18 * *'
    open-pull-requests-limit: 15
